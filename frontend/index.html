<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPTIMISED - Smart Grocery Shopping</title>
    <!-- Google Maps JavaScript API with Places Library -->
    <!-- Note: Replace YOUR_API_KEY with your actual Google Maps API key -->
    <script>
      // Load Google Maps API with error handling
      (function() {
        const apiKey = import.meta.env.VITE_GOOGLE_MAPS_API_KEY;
        if (apiKey && apiKey !== 'your_google_maps_api_key_here') {
          const script = document.createElement('script');
          script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places&loading=async`;
          script.async = true;
          script.defer = true;
          script.onerror = function() {
            console.warn('Failed to load Google Maps API. Address autocomplete will be unavailable.');
          };
          document.head.appendChild(script);
        } else {
          console.warn('Google Maps API key not configured. Address autocomplete will be unavailable.');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
